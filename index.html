<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collemaggio VR</title>
 
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component"></script>
 
  <script>
    /* ================================================
       MOVIMENTO + ROTAZIONE CUSTOM via Gamepad API
       Joystick sinistro  → muove (avanti/indietro/laterale)
       Joystick destro    → ruota (snap o continua)
       Nessuna dipendenza da aframe-extras
    ================================================ */
    AFRAME.registerComponent('quest-locomotion', {
      schema: {
        moveSpeed:   { type: 'number', default: 0.08 },
        turnSpeed:   { type: 'number', default: 2.5 },   // gradi per frame
        minX: { type: 'number', default: -10 },
        maxX: { type: 'number', default:  9  },
        minZ: { type: 'number', default: -2  },
        maxZ: { type: 'number', default:  5  }
      },
 
      init: function () {
        this.yaw = 0;           // rotazione Y del rig in gradi
        this.camEl = null;
        this.tmpVec = new THREE.Vector3();
      },
 
      tick: function (time, delta) {
        if (!this.camEl) {
          this.camEl = this.el.querySelector('[camera]');
          if (!this.camEl) return;
        }
 
        const dt = delta / 1000;   // secondi
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
 
        let moveX = 0, moveZ = 0, turnDelta = 0;
 
        for (let i = 0; i < gamepads.length; i++) {
          const gp = gamepads[i];
          if (!gp) continue;
 
          // Joystick sinistro (axes 0,1) → movimento
          const lx = gp.axes[0] || 0;
          const ly = gp.axes[1] || 0;
          if (Math.abs(lx) > 0.15) moveX += lx;
          if (Math.abs(ly) > 0.15) moveZ += ly;
 
          // Joystick destro (axes 2,3) → rotazione
          const rx = gp.axes[2] || 0;
          if (Math.abs(rx) > 0.15) turnDelta += rx;
        }
 
        // Rotazione continua fluida
        if (turnDelta !== 0) {
          this.yaw -= turnDelta * this.data.turnSpeed;
          this.el.object3D.rotation.y = THREE.MathUtils.degToRad(this.yaw);
        }
 
        // Movimento relativo alla direzione della camera
        if (moveX !== 0 || moveZ !== 0) {
          const camYaw = this.el.object3D.rotation.y;
          const speed  = this.data.moveSpeed;
 
          const dx =  Math.sin(camYaw) * (-moveZ) * speed + Math.cos(camYaw) * moveX * speed;
          const dz = -Math.cos(camYaw) * (-moveZ) * speed + Math.sin(camYaw) * moveX * speed;
 
          const pos = this.el.getAttribute('position');
          let nx = pos.x + dx;
          let nz = pos.z + dz;
 
          nx = Math.max(this.data.minX, Math.min(this.data.maxX, nx));
          nz = Math.max(this.data.minZ, Math.min(this.data.maxZ, nz));
 
          this.el.setAttribute('position', { x: nx, y: pos.y, z: nz });
        }
      }
    });
 
    /* ================================================
       AUDIO: un solo personaggio parla alla volta
    ================================================ */
    let someoneTalking = false;
 
    AFRAME.registerComponent('talk-once-generic', {
      schema: { audioId: { type: 'string' } },
      init: function () {
        let played = false;
        this.el.addEventListener('click', () => {
          if (someoneTalking || played) return;
          const sound = document.querySelector(this.data.audioId);
          sound.components.sound.playSound();
          someoneTalking = true;
          played = true;
          sound.addEventListener('sound-ended', () => { someoneTalking = false; });
        });
      }
    });
  </script>
</head>
 
<body>
 
<a-scene background="color: black" environment="preset: forest" vr-mode-ui="enabled: true">
 
  <!-- BASILICA -->
  <a-entity gltf-model="models/Basilica Collemaggio 3d.glb"
            position="0 0.1 0"
            scale="1 1 1"></a-entity>
 
  <!-- WHITEBOARD + TESTO -->
  <a-entity gltf-model="models/whiteboard.glb"
            position="13.5 0 2.5"
            scale="1.2 1.2 1.2">
    <a-text value="L'Aquila\n\nCapitale della Cultura 2026\n\nwww.quilaquila.it"
            position="-0.4 2.5 0.05"
            rotation="0 270 0"
            align="center"
            color="#8B0000"
            width="4"
            side="double">
    </a-text>
  </a-entity>
 
  <!-- LORENZO -->
  <a-entity id="lorenzo" class="cliccabile"
            gltf-model="models/Lorenzo.glb"
            position="7.65 0.2 0"
            scale="1.2 1.2 1.2"
            rotation="0 -90 0"
            talk-once-generic="audioId: #audio-Lorenzo">
    <a-sound id="audio-Lorenzo" src="audio/audioLorenzo.mp3"></a-sound>
  </a-entity>
 
  <!-- NOTICE BOARD -->
  <a-entity gltf-model="models/NoticeBoard.glb"
            position="-15 0.1 2"
            scale="1.2 1.2 1.2"></a-entity>
 
  <!-- GIORGIA -->
  <a-entity id="giorgia" class="cliccabile"
            gltf-model="models/Giorgia.glb"
            position="-14 0.2 0"
            scale="1.4 1.4 1.4"
            rotation="0 -10 0"
            talk-once-generic="audioId: #audio-Giorgia">
    <a-sound id="audio-Giorgia" src="audio/audioGiorgia.mp3"></a-sound>
  </a-entity>
 
  <!-- PRETE -->
  <a-entity id="prete" class="cliccabile"
            gltf-model="models/prete.glb"
            position="-4 0.2 0"
            scale="2.5 2.5 2.5"
            rotation="0 220 0"
            talk-once-generic="audioId: #audio-prete">
    <a-sound id="audio-prete" src="audio/audioPrete.mp3"></a-sound>
  </a-entity>
 
  <!-- LUCI -->
  <a-light type="ambient" intensity="0.01"></a-light>
  <a-light type="directional" intensity="1" position="2 4 2"></a-light>
 
  <!-- =====================================================
       RIG con locomotion custom (no aframe-extras)
  ====================================================== -->
  <a-entity id="rig"
            quest-locomotion="moveSpeed: 0.08; turnSpeed: 2.5; minX: -10; maxX: 9; minZ: -2; maxZ: 5"
            position="-2 1.6 4">
 
    <!-- CAMERA -->
    <a-entity id="camera"
              camera
              look-controls
              cursor="rayOrigin: mouse"
              raycaster="objects: .cliccabile">
      <a-cursor></a-cursor>
    </a-entity>
 
    <!-- CONTROLLER SINISTRO -->
    <a-entity id="leftHand"
              oculus-touch-controls="hand: left"
              laser-controls="hand: left"
              raycaster="objects: .cliccabile; far: 20">
    </a-entity>
 
    <!-- CONTROLLER DESTRO -->
    <a-entity id="rightHand"
              oculus-touch-controls="hand: right"
              laser-controls="hand: right"
              raycaster="objects: .cliccabile; far: 20">
    </a-entity>
 
  </a-entity>
 
</a-scene>
 
</body>
</html>
